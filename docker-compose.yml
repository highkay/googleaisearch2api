services:
  googleaisearch2api:
    image: ${GOOGLEAISEARCH2API_IMAGE:-ghcr.io/highkay/googleaisearch2api:latest}
    pull_policy: ${GOOGLEAISEARCH2API_PULL_POLICY:-always}
    init: true
    cpus: "${GOOGLEAISEARCH2API_CPUS:-2.0}"
    mem_limit: ${GOOGLEAISEARCH2API_MEMORY_LIMIT:-3g}
    pids_limit: ${GOOGLEAISEARCH2API_PIDS_LIMIT:-512}
    ports:
      - "${APP_PORT:-9010}:8000"
    environment:
      APP_HOST: 0.0.0.0
      APP_PORT: 8000
      APP_LOG_LEVEL: ${APP_LOG_LEVEL:-INFO}
      APP_DATA_DIR: /app/data
      DEFAULT_MODEL: ${DEFAULT_MODEL:-google-search}
      SEARCH_ENGINE: ${SEARCH_ENGINE:-google}
      API_TOKEN: ${API_TOKEN:?set API_TOKEN in .env or shell before starting compose}
      BROWSER_HEADLESS: ${BROWSER_HEADLESS:-true}
      BROWSER_USER_AGENT: ${BROWSER_USER_AGENT:-}
      BROWSER_LOCALE: ${BROWSER_LOCALE:-en-US}
      BROWSER_BASE_URL: ${BROWSER_BASE_URL:-https://www.google.com/search?udm=50&aep=11&hl=en}
      BROWSER_TIMEOUT_MS: ${BROWSER_TIMEOUT_MS:-90000}
      ANSWER_TIMEOUT_MS: ${ANSWER_TIMEOUT_MS:-45000}
      BROWSER_WORKERS: ${BROWSER_WORKERS:-1}
      REQUEST_QUEUE_SIZE: ${REQUEST_QUEUE_SIZE:-8}
      REQUEST_LOG_MAX_ROWS: ${REQUEST_LOG_MAX_ROWS:-200}
      GOOGLE_AI_BLOCKED_RETRY_COUNT: ${GOOGLE_AI_BLOCKED_RETRY_COUNT:-0}
      DUCK_AI_WORKERS: ${DUCK_AI_WORKERS:-1}
      DUCK_AI_QUEUE_SIZE: ${DUCK_AI_QUEUE_SIZE:-2}
      DUCK_AI_COOLDOWN_SECONDS: ${DUCK_AI_COOLDOWN_SECONDS:-120}
      PROXY_ALLOW_FALLBACK_TO_BASE: ${PROXY_ALLOW_FALLBACK_TO_BASE:-false}
      BROWSER_PROXY_SERVER: ${BROWSER_PROXY_SERVER:-}
      BROWSER_PROXY_USERNAME: ${BROWSER_PROXY_USERNAME:-}
      BROWSER_PROXY_PASSWORD: ${BROWSER_PROXY_PASSWORD:-}
      BROWSER_PROXY_BYPASS: ${BROWSER_PROXY_BYPASS:-}
      RESIN_STICKY_SESSION_ENABLED: ${RESIN_STICKY_SESSION_ENABLED:-false}
      PROXY_AUTO_RECOVERY_ENABLED: ${PROXY_AUTO_RECOVERY_ENABLED:-false}
      PROXY_AUTO_RECOVERY_INTERVAL_SECONDS: ${PROXY_AUTO_RECOVERY_INTERVAL_SECONDS:-43200}
      PROXY_AUTO_RECOVERY_RUN_ON_STARTUP: ${PROXY_AUTO_RECOVERY_RUN_ON_STARTUP:-false}
      PROXY_AUTO_RECOVERY_EXISTING_SESSIONS: ${PROXY_AUTO_RECOVERY_EXISTING_SESSIONS:-true}
      PROXY_AUTO_RECOVERY_EXISTING_SESSION_LIMIT: ${PROXY_AUTO_RECOVERY_EXISTING_SESSION_LIMIT:-0}
      PROXY_AUTO_RECOVERY_MAX_PROBES: ${PROXY_AUTO_RECOVERY_MAX_PROBES:-25}
      PROXY_AUTO_RECOVERY_TARGET_ACTIVE: ${PROXY_AUTO_RECOVERY_TARGET_ACTIVE:-1}
      PROXY_AUTO_RECOVERY_TIMEOUT_SECONDS: ${PROXY_AUTO_RECOVERY_TIMEOUT_SECONDS:-1800}
      PROXY_AUTO_RECOVERY_MIN_TRIGGER_INTERVAL_SECONDS: ${PROXY_AUTO_RECOVERY_MIN_TRIGGER_INTERVAL_SECONDS:-900}
      PROXY_AUTO_RECOVERY_SKIP_EGRESS: ${PROXY_AUTO_RECOVERY_SKIP_EGRESS:-true}
      PROXY_AUTO_RECOVERY_SKIP_IPLARK: ${PROXY_AUTO_RECOVERY_SKIP_IPLARK:-true}
      PROXY_AUTO_RECOVERY_FAST_IPAPI_EGRESS: ${PROXY_AUTO_RECOVERY_FAST_IPAPI_EGRESS:-false}
      PROXY_AUTO_RECOVERY_FAST_HTTP_PREFILTER: ${PROXY_AUTO_RECOVERY_FAST_HTTP_PREFILTER:-true}
      PROXY_AUTO_RECOVERY_FAST_HTTP_TIMEOUT: ${PROXY_AUTO_RECOVERY_FAST_HTTP_TIMEOUT:-8}
      PROXY_AUTO_RECOVERY_FAST_HTTP_SCAN_LIMIT: ${PROXY_AUTO_RECOVERY_FAST_HTTP_SCAN_LIMIT:-0}
      PROXY_AUTO_RECOVERY_FAST_HTTP_WORKERS: ${PROXY_AUTO_RECOVERY_FAST_HTTP_WORKERS:-16}
      PROXY_AUTO_RECOVERY_EVENT_FAST_HTTP_SCAN_LIMIT: ${PROXY_AUTO_RECOVERY_EVENT_FAST_HTTP_SCAN_LIMIT:-40}
      PROXY_AUTO_RECOVERY_ALLOW_KNOWN_GOOGLE_BLOCKED_IP: ${PROXY_AUTO_RECOVERY_ALLOW_KNOWN_GOOGLE_BLOCKED_IP:-true}
      PROXY_AUTO_RECOVERY_ALLOW_KNOWN_GOOGLE_BLOCKED_PREFIX: ${PROXY_AUTO_RECOVERY_ALLOW_KNOWN_GOOGLE_BLOCKED_PREFIX:-true}
      PROXY_AUTO_RECOVERY_RETRY_RETIRED: ${PROXY_AUTO_RECOVERY_RETRY_RETIRED:-false}
      PROXY_AUTO_RECOVERY_SKIP_DUCK_CANARY: ${PROXY_AUTO_RECOVERY_SKIP_DUCK_CANARY:-true}
      PROXY_AUTO_RECOVERY_CANARY_REPEATS: ${PROXY_AUTO_RECOVERY_CANARY_REPEATS:-1}
      PROXY_AUTO_RECOVERY_START: ${PROXY_AUTO_RECOVERY_START:-1}
      PROXY_AUTO_RECOVERY_END: ${PROXY_AUTO_RECOVERY_END:-1000}
    volumes:
      - googleaisearch2api-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  googleaisearch2api-data:
